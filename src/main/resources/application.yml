spring:
  application:
    name: Chiptrip-be

  config:
    import: optional:file:.env[.properties]

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  mail:
    from: ${MAIL_FROM:noreply@chiptrip.app}
    verification-url: ${FRONTEND_URL:http://localhost:3000}/verify-email
    reset-password-url: ${FRONTEND_URL:http://localhost:3000}/reset-password
    verification-expiry-hours: 24
    reset-password-expiry-hours: 1
    otp-expiry-minutes: 5
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY}
      model: gemini-2.5-flash
      base-url: https://generativelanguage.googleapis.com/v1beta
    max-retries: 2
    timeout-seconds: 60
    pricing:
      input-usd-per-1m: 0.075
      output-usd-per-1m: 0.30
  goong:
    api-key: ${GOONG_API_KEY}
    base-url: https://rsapi.goong.io
    timeout-seconds: 5
  serpapi:
    api-key: ${SERPAPI_API_KEY:}
    base-url: https://serpapi.com
    timeout-seconds: 10
    enabled: true
    cache-ttl-days: 30
  external:
    openweather-api-key: ${OPENWEATHER_API_KEY:}
  rate-limit:
    login-limit: 5
    login-window-minutes: 15
    register-limit: 3
    register-window-minutes: 60
    forgot-password-limit: 3
    forgot-password-window-minutes: 60
    generate-limit: 5
    generate-window-minutes: 1
    default-limit: 60
    default-window-minutes: 1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.tranbac.chiptripbe: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    # suppress JVM-level noise
    io.netty: WARN
    reactor.netty: WARN
    # suppress Tomcat "invalid cookie" info spam
    org.apache.tomcat.util.http.parser.Cookie: ERROR
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%15.15thread] %logger{36} - %msg%n"