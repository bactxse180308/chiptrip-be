spring:
  application:
    name: Chiptrip-be

  config:
    import: optional:file:.env[.properties]

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  mail:
    from: ${MAIL_FROM:noreply@chiptrip.app}
    verification-url: ${FRONTEND_URL:http://localhost:3000}/verify-email
    reset-password-url: ${FRONTEND_URL:http://localhost:3000}/reset-password
    verification-expiry-hours: 24
    reset-password-expiry-hours: 1
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.tranbac.chiptripbe: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN