spring:
  application:
    name: Chiptrip-be

  config:
    import: optional:file:.env[.properties]

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 8MB

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  mail:
    from: ${MAIL_FROM:noreply@chiptrip.app}
    verification-url: ${FRONTEND_URL:http://localhost:3000}/verify-email
    reset-password-url: ${FRONTEND_URL:http://localhost:3000}/reset-password
    verification-expiry-hours: 24
    reset-password-expiry-hours: 1
    otp-expiry-minutes: 5
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - https://chiptrip.online
      - https://www.chiptrip.online
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
  ai:
    openai-compat:
      # Nhiều key ngăn bởi dấu phẩy: AI_API_KEYS=key1,key2,key3 (tự xoay khi 429/401/403).
      # Tương thích ngược: nếu không đặt AI_API_KEYS thì dùng AI_API_KEY (1 key).
      api-keys: ${AI_API_KEYS:${AI_API_KEY:}}
      model: gemini-2.5-flash
      base-url: ${AI_BASE_URL}
    max-retries: 1
    timeout-seconds: 300
    pricing:
      # Giá gemini-2.5-flash (USD/1M token) — dùng để ghi cost vào ai_usages.
      input-usd-per-1m: 0.30
      output-usd-per-1m: 2.50
  goong:
    api-key: ${GOONG_API_KEY}
    base-url: https://rsapi.goong.io
    timeout-seconds: 5
  serpapi:
    # Một hoặc nhiều API key ngăn cách bằng dấu phẩy (xoay vòng, tự bỏ qua key hết lượt).
    api-key: ${SERPAPI_API_KEY:}
    base-url: https://serpapi.com
    timeout-seconds: 10
    enabled: true
    cache-ttl-days: 30
    retry-backoff-minutes: 360
    # Rate limit thật (req/giây) — gate CHÍNH chống 429. Đây là sàn an toàn; nếu log báo nhiều
    # "throttle: hết token" / place Goong-only (do trip lớn vượt deadline) thì NÂNG dần khi gói cho phép.
    requests-per-second: 3
    # Burst capacity của token bucket (số token tích tối đa). KHÔNG còn là giới hạn concurrency.
    max-concurrent: 3
    # Số giờ bỏ qua một key sau khi phát hiện hết lượt (HTTP 401) trước khi thử lại — quota free reset theo tháng.
    exhausted-cooldown-hours: 6
  posthog:
    api-host: ${POSTHOG_API_HOST:https://us.posthog.com}
    project-id: ${POSTHOG_PROJECT_ID:}
    personal-key: ${POSTHOG_PERSONAL_KEY:}
    timeout-seconds: 10
  external:
    openweather-api-key: ${OPENWEATHER_API_KEY:}
  r2:
    endpoint: ${R2_ENDPOINT:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket-name: ${R2_BUCKET_NAME:}
    public-url: ${R2_PUBLIC_URL:}
  chat:
    image-max-bytes: 5242880
  sepay:
    api-key: ${SEPAY_API_KEY:}
    bank-account: ${SEPAY_BANK_ACCOUNT:}
    bank-code: ${SEPAY_BANK_CODE:ACB}
    account-holder: ${SEPAY_ACCOUNT_HOLDER}
    qr-base-url: https://qr.sepay.vn/img
    qr-template: compact
    order-code-prefix: ${SEPAY_ORDER_CODE_PREFIX:DH}
    order-expiry-minutes: 15
    plans:
      PREMIUM:
        price-vnd: 49000
        credits: 1
      PRO:
        price-vnd: 109000
        credits: 3
  rate-limit:
    # DEV: nới lỏng để dễ test — lên production nhớ hạ về (login 5/15p, register 3/60p,
    # forgot 3/60p, generate 5/1p, default 60/1p)
    login-limit: 100
    login-window-minutes: 15
    register-limit: 50
    register-window-minutes: 60
    forgot-password-limit: 50
    forgot-password-window-minutes: 60
    generate-limit: 10
    generate-window-minutes: 1
    default-limit: 300
    default-window-minutes: 1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.tranbac.chiptripbe: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    # suppress JVM-level noise
    io.netty: WARN
    reactor.netty: WARN
    # suppress Tomcat "invalid cookie" info spam
    org.apache.tomcat.util.http.parser.Cookie: ERROR
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%15.15thread] %logger{36} - %msg%n"
